<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Exploration - Vehicle Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .btn-primary { background-color: #0d6efd; border-color: #0d6efd; }
        .btn-primary:hover { background-color: #0b5ed7; border-color: #0b5ed7; }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Vehicle Analytics</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <header class="mb-4 border-bottom pb-3">
            <h1 class="fw-bold text-dark">Data Exploration</h1>
            <p class="text-secondary mb-0">Comprehensive analysis of the vehicle dataset</p>
        </header>

        <!-- Dataset Exploration -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white border-bottom py-3">
                <span class="fw-bold">Dataset Overview</span>
            </div>
            <div class="card-body overflow-x-auto">
                {{ dataset_exploration|safe }}
            </div>
        </div>

        <!-- Statistical Analysis -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white border-bottom py-3">
                <span class="fw-bold">Statistical Analysis</span>
            </div>
            <div class="card-body overflow-x-auto">
                {{ data_exploration|safe }}
            </div>
        </div>
        
        <!-- Rwanda Vehicle Distribution Map -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3">
                <span class="fw-bold">Rwanda Vehicle Distribution Map</span>
            </div>
            <div class="card-body">
                {{ rwanda_map|safe }}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
